<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book-Recommender-System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<style>
    .card {
    height: 100%;
    background-color: #1f2937;
    color: white;
    border: none;
}

.book-title {
    height: 80px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
}

.book-img {
    height: 300px;
    width: 100%;
    object-fit: cover;
}
    .text-white{
    color:white
    }
    .book-img{
    height:300px;
    object-fit:cover;
}
</style>
<body style="background-color:black">

    <nav class="navbar navbar-expand-lg px-4 py-2" style="background-color:#00a65a">
    <div class="container-fluid">

        <a class="navbar-brand text-white fw-bold fs-3" href="/">
            📚 My Book Recommender
        </a>

        <ul class="navbar-nav ms-auto flex-row">
            <li class="nav-item mx-3">
                <a class="nav-link text-white fs-5" href="/">Home</a>
            </li>

            <li class="nav-item mx-3">
                <a class="nav-link text-white fs-5" href="/recommend">
                    Recommend
                </a>
            </li>

            <li class="nav-item mx-3">
                <a class="nav-link text-white fs-5" href="/contact">
                    Contact
                </a>
            </li>
        </ul>

    </div>
</nav>
< <div class="container">
        <div class="row">
            <div class="col-md-12">
                <h1 class="text-white" style="font-size:45px">Top 50 Books</h1>
            </div>

            {% for i in range(book_name|length) %}
                <div class="col-md-3" style="margin-top:50px">
<div class="card-body bg-dark text-white">
    <img src="{{ image[i] }}" class="card-img-top book-img">

    <h5 class="book-title mt-3">
        {{ book_name[i] }}
    </h5>

    <p class="text-secondary">
        {{ author[i] }}
    </p>

    <p>
        ⭐ {{ "%.2f"|format(rating[i]) }}<br>
        👍 {{ votes[i] }} votes
    </p>
</div>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
